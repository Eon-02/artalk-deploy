# Artalk 配置文件 - 用于 Railway 部署
host: "0.0.0.0"
port: 8080  # start.sh 中通过 -p $PORT 会覆盖此值
app_key: "makocode-artalk-key-2024"
debug: false
locale: zh-CN
timezone: Asia/Shanghai
site_default: "aaayuzu 留言板"
site_url: "https://aaayuzu.cc.cd"

# 数据库 - 使用 SQLite（HF Spaces 的 /data 目录持久化存储）
db:
  type: sqlite
  file: /data/artalk/artalk.db

login_timeout: 259200

http:
  body_limit: 100
  proxy_header: "X-Forwarded-For"

log:
  enabled: true
  filename: /data/artalk/artalk.log

cache:
  enabled: false
  type: builtin
  expires: 30

trusted_domains:
  - https://aaayuzu.cc.cd
  - https://*.railway.app
  - https://*.up.railway.app

ssl:
  enabled: false

moderator:
  pending_default: false

captcha:
  enabled: true
  always: false
  captcha_type: image
  action_limit: 3
  action_reset: 60

img_upload:
  enabled: true
  path: /data/artalk/artalk-img/
  max_size: 5

frontend:
  editorTravel: true
  vote: true
  uaBadge: false
  listSort: true
  flatMode: auto
  nestMax: 2

# 认证 API
auth:
  # 启用认证 API
  enabled: true
  # 允许匿名评论
  anonymous: false
  # 回调地址
  callback: "https://artalk-deploy-production.up.railway.app/api/v2/auth/{provider}/callback"
  # 邮箱密码登录
  email:
    enabled: true

# 管理员账号 (启动时自动创建)
admin_users:
  - name: "aayu"
    email: "admin@aaayuzu.cc.cd"
    password: "aayuAdmin123!"
    badge_name: "管理员"
    badge_color: "#FF6B9D"
