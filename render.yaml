# Render Blueprint 配置
# 使用方式：在 Render Dashboard 选择 Blueprint，连接此仓库即可自动部署

services:
  # Artalk Web 服务
  - type: web
    name: artalk
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    region: singapore  # 新加坡节点，亚洲访问较快
    healthCheckPath: /api/version
    envVars:
      # 数据库类型
      - key: ARTALK_DB_TYPE
        value: pgsql
      # 数据库连接信息（自动从 PostgreSQL 服务获取）
      - key: ARTALK_DB_HOST
        fromDatabase:
          name: artalk-db
          property: host
      - key: ARTALK_DB_PORT
        fromDatabase:
          name: artalk-db
          property: port
      - key: ARTALK_DB_NAME
        fromDatabase:
          name: artalk-db
          property: database
      - key: ARTALK_DB_USER
        fromDatabase:
          name: artalk-db
          property: user
      - key: ARTALK_DB_PASSWORD
        fromDatabase:
          name: artalk-db
          property: password
      - key: ARTALK_DB_SSL
        value: "true"

# PostgreSQL 数据库
databases:
  - name: artalk-db
    plan: free
    region: singapore
    databaseName: artalk
    user: artalk
